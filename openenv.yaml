name: EmailTriage
version: 11.0.0
description: >
  Advanced Enterprise Agent Benchmark based on RLVR (2408.10215) and RLVE (2601.19100).
  Features Causal Dependency Tracking, Process-Supervised Rewards, and Dynamic System Perturbations.
  Optimized for high-stakes professional task simulation.

author: "EmailTriage Team"
license: MIT

rubrics:
  - id: causal_logic
    weight: 0.3
    description: "check_calendar before schedule"
  - id: p0_crisis
    weight: 0.4
    description: "escalate within 3 steps"

references:
  - id: rlvr_paper
    title: "RLVR: Reinforcement Learning from Verifiable Rewards"
    url: "https://arxiv.org/abs/2408.10215"
  - id: rlve_paper
    title: "RLVE: Verifiable Environments for Professional Agents"
    url: "https://arxiv.org/abs/2601.19100"
  - id: openenv_core
    url: "https://github.com/meta-pytorch/OpenEnv"

tasks:
  - name: "expert_rlve"
    description: >
      Professional enterprise workflow requiring causal reasoning and crisis resilience.
      Agent must manage a conflicting calendar, escalate data leak emergencies mid-workflow,
      and resolve boss requests with verifiable logical consistency.
    difficulty: expert
    grader: "environment.grader"
    max_steps: 25
    email_count: 5

action_space:
  type: structured_json
  schema: |
    {
      "type": "object",
      "required": ["tool", "params"],
      "properties": {
        "tool": {"type": "string", "enum": ["check_calendar", "schedule_meeting", "create_task", "reply_email", "escalate"]},
        "params": {"type": "object"}
      }
    }

observation_space:
  type: structured_json
  description: >
    Statefully tracks Inbox, Calendar (Conflicts), and Task Board.
    Includes dynamic incident injections for testing robustness.

reward:
  type: dense
  range: [0.01, 0.99]
  description: >
    Layered Causal Rewards.
    - Path Reward: +0.1 to +0.2 for valid tools.
    - Logic Reward: +0.6 for correct tool dependencies (e.g. check before schedule).
    - Crisis Penalty: -0.4 for ignoring mid-episode emergencies.
    - Terminal Bonus: +0.9 for verifiable environment success.

deploy:
  platform: huggingface_spaces
  sdk: docker
  port: 7860
  hardware: gpu-basic
