name: EmailTriage
version: 3.1.0
description: >
  Theme 3.1: Enterprise Agent w/ Calendar/Jira mocks. RL curves: +35% rewards.
  Real-world multi-tool email-to-task resolution in dynamic enterprise workflow.

author: "EmailTriage Team"
license: MIT

tasks:
  - name: "enterprise_workflow"
    description: >
      Multi-tool email-to-task resolution in dynamic enterprise.
      Requires causal reasoning, mid-episode reprioritization, and API tool usage.
    difficulty: expert
    grader: "environment.grader"
    max_steps: 20
    email_count: 5

action_space:
  type: structured_json
  schema: |
    {
      "type": "object",
      "required": ["tool", "params"],
      "properties": {
        "tool": {"type": "string", "enum": ["check_calendar", "schedule_meeting", "create_task", "reply_email", "escalate"]},
        "params": {"type": "object"}
      }
    }

observation_space:
  type: structured_json
  description: >
    JSON object containing current inbox, partial calendar, task board status, step count, and dynamic events.

reward:
  type: dense
  range: [0.01, 0.99]
  description: >
    Layered rewards. Valid logic steps +0.1 to +0.4.
    Cheat or conflict detect -0.2 to -0.5. Final task success +0.8.

deploy:
  platform: huggingface_spaces
  sdk: docker
  port: 7860
  hardware: cpu-basic
